<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Promo — small tile 440×280</title>
        <link rel="stylesheet" href="promo.css" />
    </head>
    <body>
        <div class="promo-small">
            <span class="ps-mark" aria-hidden="true">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="6" width="18" height="2.6" rx="1.3" fill="currentColor"/>
                    <rect x="3" y="11" width="13" height="2.6" rx="1.3" fill="currentColor"/>
                    <rect x="3" y="16" width="8" height="2.6" rx="1.3" fill="currentColor"/>
                </svg>
            </span>

            <div>
                <p class="ps-eyebrow">SUMMARIZER</p>
                <h1 class="ps-headline">
                    Read less.<br /><em>Get the gist.</em>
                </h1>
            </div>

            <p class="ps-sub">
                Select any text. Right-click. A summary streams into Chrome's
                side panel.
            </p>

            <div class="ps-foot">
                <span>⌘⇧S · RIGHT-CLICK · PDFS</span>
                <span class="pill">
                    <span class="dot"></span>
                    ON-DEVICE
                </span>
            </div>
        </div>
    </body>
</html>
