<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Summarizer</title>
        <link rel="stylesheet" href="tokens.css" />
        <link rel="stylesheet" href="popup.css" />
    </head>
    <body>
        <header class="p-top">
            <div class="p-brand">
                <span class="brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="6" width="18" height="2.6" rx="1.3" class="stripe-fg"/>
                        <rect x="3" y="11" width="13" height="2.6" rx="1.3" class="stripe-fg"/>
                        <rect x="3" y="16" width="8" height="2.6" rx="1.3" class="stripe-accent"/>
                    </svg>
                </span>
                <span class="eyebrow">Summarizer</span>
            </div>
        </header>

        <main class="p-main">
            <div class="p-row">
                <span class="dot" id="p-dot" data-state="off"></span>
                <div class="p-status-text">
                    <span class="eyebrow" id="p-status-label">Checking</span>
                    <p class="p-detail" id="p-detail">…</p>
                </div>
            </div>

            <p class="p-hint">
                Select text on any page, then right-click
                <em>Summarize selection</em> or press <kbd id="p-kbd">⌘⇧S</kbd>.
            </p>

            <section class="p-prompt">
                <label class="eyebrow" for="p-prompt-input">
                    Custom prompt
                </label>
                <p class="p-prompt-help">
                    Used by the cloud Gemini fallback. On-device Nano uses
                    its own format — pick length in the side panel.
                </p>
                <textarea
                    id="p-prompt-input"
                    rows="3"
                    placeholder="Summarize the following text:"
                ></textarea>
                <p class="p-save-status" id="p-prompt-status"></p>
            </section>

            <div class="p-actions">
                <button class="ghost" id="p-open-welcome">Re-run setup</button>
                <button class="ghost" id="p-open-options">Settings</button>
            </div>
        </main>

        <script src="popup.js"></script>
    </body>
</html>
